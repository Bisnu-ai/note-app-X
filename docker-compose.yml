# Two services: backend API on 8000
services:
  backend:
    build: ./server
    container_name: backend
    restart: always
    env_file:
      - ./server/.env        
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./client
      args:
        VITE_API_URL: http://51.21.161.249:8000/api
    container_name: frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend